<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shower - Nataly Samantha</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  overflow:hidden;
}

/* ===== PANTALLA CUENTO ===== */

.story{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,#4338ca,#1e1b4b);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  z-index:10;
  transition:1.5s;
}

.story h2{
  font-size:28px;
  animation:fade 2s ease;
}

@keyframes fade{
  from{opacity:0}
  to{opacity:1}
}

/* ===== MAIN ===== */

.main{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#fde2f3,#e9d5ff,#dbeafe);
  background-size:300% 300%;
  animation:pastelMove 15s infinite alternate;
}

@keyframes pastelMove{
  0%{background-position:0% 50%}
  100%{background-position:100% 50%}
}

.card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.75);
  padding:50px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  border:2px solid rgba(255,255,255,.6);
  transition:.2s;
  transform-style:preserve-3d;
}

/* Glow rosa */

.name{
  font-family:'Great Vibes', cursive;
  font-size:65px;
  color:#ff4fa3;
  text-shadow:0 0 15px #ff4fa3, 0 0 30px #ff4fa3;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 10px #ff4fa3;}
  to{text-shadow:0 0 30px #ff4fa3;}
}

/* Form */

form{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input, textarea{
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px;
  border:none;
  border-radius:25px;
  background:#ff4fa3;
  color:white;
  font-weight:500;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.05);
}

/* Petalos */

.petal{
  position:fixed;
  width:15px;
  height:15px;
  background:pink;
  border-radius:50%;
  opacity:.7;
  animation:fall 8s linear forwards;
}

@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(110vh);}
}

/* Particulas */

.particle{
  position:fixed;
  width:6px;
  height:6px;
  background:#ffb6e6;
  border-radius:50%;
  opacity:.5;
  animation:float 10s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<!-- CUENTO -->
<div class="story" id="story">
  <h2 id="storyText">Había una vez…</h2>
</div>

<!-- MAIN -->
<div class="main" id="main" style="display:none;">
  <div class="card" id="card">

    <h1>Una pequeña princesa está por llegar 👑</h1>
    <div class="name">Nataly Samantha</div>
    <p>Domingo 22 de Marzo 2026 - 3:30 PM</p>
    <p>Santa Ana Zegache</p>

    <form>
      <input type="text" id="nombre" placeholder="Tu nombre">
      <input type="number" id="personas" placeholder="¿Cuántas personas?">
      <textarea id="mensaje" placeholder="Mensaje bonito opcional 💕"></textarea>
      <button type="button" onclick="sendWhatsApp()">Confirmar por WhatsApp 💕</button>
    </form>

  </div>
</div>

<script>

/* ===== CUENTO ANIMADO ===== */

const story = document.getElementById("story");
const storyText = document.getElementById("storyText");
const main = document.getElementById("main");

const messages = [
"Había una vez…",
"Una noche mágica ✨",
"Una pequeña princesa que está por llegar 👑",
"Nataly Samantha 💕"
];

let i=0;

function nextMessage(){
  if(i < messages.length){
    storyText.innerText = messages[i];
    i++;
    setTimeout(nextMessage,2000);
  } else {
    story.style.opacity="0";
    setTimeout(()=>{
      story.style.display="none";
      main.style.display="flex";
      petals();
    },1500);
  }
}

setTimeout(nextMessage,2000);

/* ===== LLUVIA DE PETALOS ===== */

function petals(){
  for(let i=0;i<30;i++){
    let p=document.createElement("div");
    p.className="petal";
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(Math.random()*5+5)+"s";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),8000);
  }
}

/* ===== PARTICULAS SUAVES ===== */

for(let i=0;i<40;i++){
  let part=document.createElement("div");
  part.className="particle";
  part.style.left=Math.random()*100+"%";
  part.style.animationDuration=(Math.random()*10+5)+"s";
  document.body.appendChild(part);
}

/* ===== PARALLAX 3D ===== */

const card=document.getElementById("card");

document.addEventListener("mousemove",(e)=>{
  const x=(window.innerWidth/2 - e.pageX)/30;
  const y=(window.innerHeight/2 - e.pageY)/30;
  card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

/* ===== WHATSAPP INTELIGENTE ===== */

function sendWhatsApp(){

  const nombre=document.getElementById("nombre").value;
  const personas=document.getElementById("personas").value;
  const mensaje=document.getElementById("mensaje").value;

  if(!nombre || !personas){
    alert("Completa nombre y número de personas 💕");
    return;
  }

  const hora=new Date().getHours();
  let saludo="";

  if(hora < 12){
    saludo="Buenos días";
  }else if(hora < 19){
    saludo="Buenas tardes";
  }else{
    saludo="Buenas noches";
  }

  let texto=`¡Hola! 💗 ${saludo}, soy ${nombre}. Confirmo mi asistencia con ${personas} personas al Baby Shower de Nataly Samantha 💕`;

  if(mensaje){
    texto+=` ${mensaje}`;
  }

  const numero="5219511712247";

  const url=`https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;

  window.location.href=url;
}

</script>

</body>
</html>
